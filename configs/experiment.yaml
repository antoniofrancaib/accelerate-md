# ─────────────────────────────────────────────────────────────
# UNIFIED EXPERIMENT CONFIGURATION
# ─────────────────────────────────────────────────────────────
# Choose experiment type: "aldp" or "gmm"
experiment_type: "aldp"  # Change this to switch between experiments: gmm or aldp

# ─────────────────────────────────────────────────────────────
# Experiment identity + hardware
# ─────────────────────────────────────────────────────────────
name: "unified_experiment_auto"  # Will be auto-generated based on experiment_type
device: "cuda"  # or "cpu"

# ─────────────────────────────────────────────────────────────
# Parallel Tempering Settings (shared)
# ─────────────────────────────────────────────────────────────
pt:
  temperatures: [1.0, 1.5] # Lower temperature range suitable for ALDP
  num_chains: 32
  num_steps: 200000
  swap_interval: 500
  check_interval: 10000
  step_size: 1e-4

# ─────────────────────────────────────────────────────────────
# Flow backend & hyperparameters (shared)
# ─────────────────────────────────────────────────────────────
model_type: realnvp

trainer:
  realnvp:
    model:
      hidden_dim: 1024
      n_couplings: 150
      use_permutation: true
    training:
      n_epochs: 120
      batch_size: 256
      learning_rate: 1e-5
      warmup_epochs: 3
      n_samples: 10000
      mse_weight: 0.01
      val_split: 0.1
      patience: 5
      seed: 42
      eta_min_factor: 0.1
      max_grad_norm: 1.0

# ─────────────────────────────────────────────────────────────
# TARGET-SPECIFIC CONFIGURATIONS
# ─────────────────────────────────────────────────────────────

# ALDP-specific settings
aldp:
  target:
    data_path: "./datasets/aldp/position_min_energy.pt"
    transform: cartesian
    env: implicit
  
  system:
    temperature: 300           # Kelvin
    energy_cut: 1.e8
    energy_max: 1.e20
    n_threads: 64
    transform: cartesian
    shift_dih: false
    env: implicit
    data:
      transform_path: "./datasets/aldp/position_min_energy.pt"

# GMM-specific settings
gmm:
  gmm_params:
    dim: 3
    n_mixes: 8
    loc_scaling: 5.0
    mode_arrangement: "random"
    grid_range: [-6.0, 6.0]

# ─────────────────────────────────────────────────────────────
# Evaluation settings
# ─────────────────────────────────────────────────────────────
evaluation:
  num_samples_to_plot: 1000000
  num_samples_for_eval: 10000

# ─────────────────────────────────────────────────────────────
# Enhanced Ramachandran Plot Settings
# ─────────────────────────────────────────────────────────────
ramachandran_plots:
  sampling:
    n_samples: 15000           # Increased from default
    n_steps: 30000             # Increased MCMC chain length
    burn_in: 5000              # Burn-in period
    thin: 2                    # Thinning interval
    convergence_check: true    # Check for convergence
  visualization:
    use_reference_background: true     # Add standard backgrounds
    reference_database: "builtin"     # Use builtin reference data
    residue_classification: "general" # ALDP is general residue
    density_estimation: "kde"         # Use KDE instead of histograms
    contour_levels: [0.01, 0.05, 0.70, 0.85, 0.95]
    bins: 100                         # Higher resolution than default 50
    smoothing_sigma: 1.0              # Gaussian smoothing parameter
    color_scheme: "publication"       # Professional color scheme
  validation:
    effective_sample_size_min: 1000   # Minimum ESS for valid results
    autocorr_time_max: 100           # Maximum acceptable autocorr time
    rhat_threshold: 1.1              # Gelman-Rubin statistic threshold
  output:
    save_raw_data: true              # Save phi/psi data for analysis
    save_reference_plots: true       # Save reference-only plots
    dpi: 300                         # High-resolution output

# ─────────────────────────────────────────────────────────────
# PLOT AND METRICS CONTROL FLAGS
# ─────────────────────────────────────────────────────────────
plots_and_metrics:
  # Training plots (generated with --train flag)
  training_loss: true                          # Plot training/validation loss curves → training_loss_{suffix}.png
  
  # Basic evaluation plots (generated with --evaluate flag)
  bidirectional_verification: false           # GMM bidirectional scatter plot
  ramachandran_comparison: true                 # ALDP Ramachandran plots
  
  # Swap rate and acceptance metrics
  swap_rate_evaluation: true                   # Basic swap rate computation → swap_rate_flow_{suffix}.json
  acceptance_autocorrelation: false            # Legacy acceptance autocorr → acceptance_autocorrelation_{suffix}.png
  moving_average_acceptance: false             # Legacy moving average → moving_average_acceptance_{suffix}.png
  
  # Enhanced sampling metrics (advanced)
  autocorrelation_comparison: true             # Integrated autocorrelation → autocorrelation_comparison_{suffix}.png
  effective_sample_size_comparison: true       # ESS analysis → effective_sample_size_comparison_{suffix}.png
  round_trip_exploration: false                 # Round trip analysis → round_trip_exploration_{suffix}.png

# ─────────────────────────────────────────────────────────────
# SHARED CONFIGURATIONS
# ─────────────────────────────────────────────────────────────

# Kernel choices
local_kernel:
  type: "langevin"
  step_size: null  # Will be set from pt.step_size
  mh: true
  device: null     # Will be set from device

swap_kernel:
  type: "realnvp"
  flow_checkpoint: null  # Will be auto-generated
  device: null           # Will be set from device
  fallback_to_vanilla: true 