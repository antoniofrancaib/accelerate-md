# Flow model training hyperparameters
# This file contains training-specific configuration for temperature-transition flows

training:
  # Optimization
  learning_rate: 0.0003     # Target learning rate after warmup (3e-4)
  initial_lr: 0.0001        # Initial learning rate for warmup (1e-4)
  max_grad_norm: 5.0        # Maximum gradient norm for clipping
  warmup_epochs: 5          # Number of epochs for linear warmup
  val_split: 0.1            # Fraction of data to use for validation
  batch_size: 256           # Batch size for training
  
  # Training loop control
  n_epochs: 100             # Maximum number of training epochs
  patience: 20              # Early stopping patience (epochs without improvement)
  val_freq: 1               # Validate every N epochs
  
  # Reproducibility
  seed: 42                  # Random seed for reproducibility
  
  # Scheduler settings for cosine decay
  eta_min_factor: 0.05      # Minimum LR will be this fraction of target LR
  
  # I/O
  model_dir: "checkpoints"  # Directory to save model checkpoints

# Model architecture parameters
model:
  dim: 2                    # Input/output dimension (should match GMM dimension)
  hidden_dim: 256           # Hidden dimension for coupling networks
  n_couplings: 14           # Number of coupling layers 
  use_permutation: true     # Whether to use coordinate permutation between blocks
  patch_size: 1             # Size of patches (typically 1 for 2D data)
  use_nvp: true             # Whether to use affine coupling 

# Configuration for plots and visualizations
plot_dir: "plots/realnvp"    # Directory to save plots 