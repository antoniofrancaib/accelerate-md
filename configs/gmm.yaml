# -----------------------------------------------------------------------------
# Experiment: Extreme‐swap acceptance on 60D GMM + RealNVP flows
# -----------------------------------------------------------------------------
name: "gmm60d_40m_grid"
device: "cuda"

# -----------------------------------------------------------------------------
# 1) GMM target distribution settings
# -----------------------------------------------------------------------------
gmm:
  dim: 60                     # 60D Gaussian Mixture Model
  n_mixes: 40                  # Reduced for higher dimension
  loc_scaling: 6.0

  custom_modes: false
  mode_arrangement: "random"  # For very high dimensions, random is more reliable
  
  # Unified range for all dimensions
  grid_range: [-6.0, 6.0]
  
  # Common parameters for non-custom modes
  uniform_mode_scale: 0.2     # isotropic std-dev for all components

# -----------------------------------------------------------------------------
# 2) Parallel Tempering settings (naive & flow‐based share these)
# -----------------------------------------------------------------------------
pt:
  temp_low: 1.0
  temp_high: 100.0
  total_n_temp: 2
  temp_schedule: "geom"
  num_chains: 1
  num_steps: 10000            # Reduced for quick testing
  burn_in:   500
  swap_interval: 100
  check_interval: 500
  step_size: 0.0001

# -----------------------------------------------------------------------------
# 3) RealNVP trainer parameters
# -----------------------------------------------------------------------------
trainer:
  realnvp:
    # where to save each temperature‐pair flow
    checkpoint_dir: "checkpoints/realnvp_gmm60d"

    # model architecture
    model:
      dim:           60       # Will be automatically synced with gmm.dim
      hidden_dim:    512     # Larger for higher dimensions
      n_couplings:   60       # One per dimension is a good rule of thumb
      use_permutation: true

    # optimization
    training:
      n_epochs:        120     # Reduced for quick testing
      batch_size:      256    # Smaller batch size due to higher memory usage
      learning_rate:  1e-5    # Reduced for stability in higher dimensions
      initial_lr:     5e-6
      max_grad_norm:  1.0     # More conservative gradient clipping
      warmup_epochs:   3
      eta_min_factor:  0.1
      patience:       5
      val_split:      0.1
      n_samples:     5000     # Reduced for memory efficiency
      seed:           42
      mse_weight:     0.01    # Reduced to focus on likelihood

# -----------------------------------------------------------------------------
# 4) Evaluation & I/O
# -----------------------------------------------------------------------------
evaluator:
  # where to read the flows you just trained
  checkpoint_dir: "checkpoints/realnvp_gmm60d"

  # where to dump plots & summary JSON
  plot_dir:    "plots/pt"
  results_dir: "results"

# -----------------------------------------------------------------------------
# 4) Output Structure (for main.py)
# -----------------------------------------------------------------------------
output:
  # Base directory for all experiment outputs
  base_dir: "outputs"
  
  # Per-experiment structure (absolute paths to avoid circular refs)
  experiment_dir: "outputs/${name}"
  model_path: "outputs/${name}/model.pt"
  config_copy_path: "outputs/${name}/config.yaml"
  metrics_path: "outputs/${name}/metrics.json"
  
  # Subdirectories (absolute paths to avoid circular refs)
  plots_dir: "outputs/${name}/plots"
  logs_dir: "outputs/${name}/logs"
  log_file: "outputs/${name}/logs/experiment.log" 