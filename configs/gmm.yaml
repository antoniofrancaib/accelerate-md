name: "gmm_2dim_5mod_2rep_random"
device: "cuda"

target:
  type: gmm
gmm:
  dim: 2
  n_mixes: 5
  loc_scaling: 5.0
  mode_arrangement: "random"
  grid_range: [-6.0, 6.0]

pt:
  temp_low: 1.0
  temp_high: 10.0
  total_n_temp: 2
  temp_schedule: "geom"
  num_steps: 100000
  swap_interval: 1000

model_type: realnvp

trainer:
  realnvp:
    model:
      hidden_dim: 512
      n_couplings: 30
      use_permutation: true
    training:
      n_epochs: 120
      batch_size: 256
      learning_rate: 1e-5
      warmup_epochs: 3
      n_samples: 10000
      mse_weight: 0.01
      val_split: 0.1
      patience: 5
      seed: 42
      eta_min_factor: 0.1
      max_grad_norm: 1.0
