# -----------------------------------------------------------------------------
# Experiment: Extreme‐swap acceptance on 2D GMM + RealNVP flows
# -----------------------------------------------------------------------------
name: "gmm40_grid"
device: "cuda"

# -----------------------------------------------------------------------------
# 1) GMM target distribution settings
# -----------------------------------------------------------------------------
gmm:
  dim: 2
  n_mixes: 40
  loc_scaling: 6.0

  custom_modes: false          # use the hard-coded modes above
  mode_arrangement: "grid"    # "circle" or "grid"
  
  # Grid arrangement parameters (when mode_arrangement = "grid")
  grid_x_range: [-6.0, 6.0]   # min and max x-coordinates
  grid_y_range: [-6.0, 6.0]   # min and max y-coordinates
  grid_rows: 5                # number of rows in the grid (suggestion: sqrt(n_mixes))
  grid_cols: 8                # number of columns in the grid
  
  # Common parameters for non-custom modes
  uniform_mode_scale: 0.18    # isotropic std-dev for all components

# -----------------------------------------------------------------------------
# 2) Parallel Tempering settings (naive & flow‐based share these)
# -----------------------------------------------------------------------------
pt:
  temp_low: 1.0
  temp_high: 10.0
  total_n_temp: 2
  temp_schedule: "geom"     # "geom" or "linear"
  num_chains: 1
  num_steps: 100000
  burn_in:   1000
  swap_interval: 100
  check_interval: 1000
  step_size: 0.0001

# -----------------------------------------------------------------------------
# 3) RealNVP trainer parameters
# -----------------------------------------------------------------------------
trainer:
  realnvp:
    # where to save each temperature‐pair flow
    checkpoint_dir: "checkpoints/realnvp_gmm40"

    # model architecture
    model:
      dim:           2
      hidden_dim:  512
      n_couplings:  50
      use_permutation: true

    # optimization
    training:
      n_epochs:        120
      batch_size:      1024
      learning_rate:  5e-5
      initial_lr:     1e-5
      max_grad_norm:  5.0
      warmup_epochs:   10
      eta_min_factor:  0.05
      patience:       20
      val_split:      0.10
      n_samples:     200000
      seed:           42
      mse_weight:     0.05

# -----------------------------------------------------------------------------
# 4) Evaluation & I/O
# -----------------------------------------------------------------------------
evaluator:
  # where to read the flows you just trained
  checkpoint_dir: "checkpoints/realnvp_gmm40"

  # where to dump plots & summary JSON
  plot_dir:    "plots/pt"
  results_dir: "results"

# -----------------------------------------------------------------------------
# 4) Output Structure (for main.py)
# -----------------------------------------------------------------------------
output:
  # Base directory for all experiment outputs
  base_dir: "outputs"
  
  # Per-experiment structure (absolute paths to avoid circular refs)
  experiment_dir: "outputs/${name}"
  model_path: "outputs/${name}/model.pt"
  config_copy_path: "outputs/${name}/config.yaml"
  metrics_path: "outputs/${name}/metrics.json"
  
  # Subdirectories (absolute paths to avoid circular refs)
  plots_dir: "outputs/${name}/plots"
  logs_dir: "outputs/${name}/logs"
  log_file: "outputs/${name}/logs/experiment.log"
