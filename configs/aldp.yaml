# ─────────────────────────────────────────────────────────────
# Experiment identity + hardware
# ─────────────────────────────────────────────────────────────
name: "aldp_cart_2rep_150coup_1024hidden" 
device: "cuda"         # or "cpu"

# ─────────────────────────────────────────────────────────────
# Which target distribution we'll sample from
# ─────────────────────────────────────────────────────────────
target:
  type: aldp
  data_path: "./datasets/aldp/position_min_energy.pt"
  transform: cartesian
  env: implicit

# ─────────────────────────────────────────────────────────────
# Molecular system definition
# ─────────────────────────────────────────────────────────────
system:
  temperature: 300           # Kelvin
  energy_cut: 1.e8
  energy_max: 1.e20
  n_threads: 64
  transform: cartesian
  shift_dih: false
  env: implicit
  data:
    transform_path: "./datasets/aldp/position_min_energy.pt"
# ─────────────────────────────────────────────────────────────
# Parallel‐Tempering settings
# ─────────────────────────────────────────────────────────────
pt:
  temperatures: [1.0, 10.0]
  temp_low:      1.0
  temp_high:     10.0
  total_n_temp:  2
  temp_schedule: geom

  num_chains:    32
  num_steps:     200000
  swap_interval: 500
  check_interval: 10000
  step_size:     1e-4

# ─────────────────────────────────────────────────────────────
# Evaluation settings
# ─────────────────────────────────────────────────────────────
evaluation:
  num_samples_to_plot: 1000000
  num_samples_for_eval:   10000

  # +++ Added: New parameters for Exploration Metrics +++
  num_samples_for_exploration_metric: 10000 # Number of samples for generating trajectories for this metric
  naive_exploration_autocorr_factor: 0.95  # Autocorrelation factor for the synthetic naive trajectory (0.0 to 1.0)
  
  # Settings for custom ALDP state definitions for exploration metrics
  exploration_use_custom_aldp_states: True # Set to False to force K-Means for ALDP state definition
  exploration_aldp_custom_n_states: 16     # Desired number of custom ALDP states (if using custom)
  exploration_aldp_custom_centers_id: "default_16_aldp_states" # An identifier for your set of custom states (e.g., filename without .npy)
  exploration_aldp_custom_centers_file: "configs/aldp_custom_states_16.npy" # Path to the .npy file with custom state definitions (shape: [N, 66])
  
  # Settings for K-Means state definition (used if not ALDP, or if custom ALDP fails/is disabled)
  exploration_kmeans_n_states_max: 8       # Max states for K-Means if it's used
  # +++ End Added +++

# ─────────────────────────────────────────────────────────────
# Flow backend & hyperparameters
# ─────────────────────────────────────────────────────────────
model_type: realnvp

trainer:
  realnvp:
    model:
      hidden_dim: 1024
      n_couplings: 150
      use_permutation: true
    training:
      n_epochs: 120
      batch_size: 256
      learning_rate: 1e-5
      warmup_epochs: 3
      n_samples: 10000
      mse_weight: 0.01
      val_split: 0.1
      patience: 5
      seed: 42
      eta_min_factor: 0.1
      max_grad_norm: 1.0
