# ─────────────────────────────────────────────────────────────
# Experiment identity + hardware
# ─────────────────────────────────────────────────────────────
name: "aldp_cart_2rep" 
device: "cuda"         # or "cpu"

# ─────────────────────────────────────────────────────────────
# Which target distribution we'll sample from
# ─────────────────────────────────────────────────────────────
target:
  type: aldp
  data_path: "./datasets/aldp/position_min_energy.pt"
  transform: cartesian
  env: implicit

# ─────────────────────────────────────────────────────────────
# Molecular system definition
# ─────────────────────────────────────────────────────────────
system:
  temperature: 300           # Kelvin
  energy_cut: 1.e8
  energy_max: 1.e20
  n_threads: 64
  transform: cartesian
  shift_dih: false
  env: implicit
  data:
    transform_path: "./datasets/aldp/position_min_energy.pt"
# ─────────────────────────────────────────────────────────────
# Parallel‐Tempering settings
# ─────────────────────────────────────────────────────────────
pt:
  temperatures: [1.0, 10.0]
  temp_low:      1.0
  temp_high:     10.0
  total_n_temp:  2
  temp_schedule: geom

  num_chains:    32
  num_steps:     200000
  swap_interval: 500
  check_interval: 10000
  step_size:     1e-4

# ─────────────────────────────────────────────────────────────
# Evaluation settings
# ─────────────────────────────────────────────────────────────
evaluation:
  num_samples_to_plot: 1000000
  num_samples_for_eval:   10000

# ─────────────────────────────────────────────────────────────
# Flow backend & hyperparameters
# ─────────────────────────────────────────────────────────────
model_type: realnvp

trainer:
  realnvp:
    model:
      hidden_dim: 1024
      n_couplings: 100
      use_permutation: true
    training:
      n_epochs: 120
      batch_size: 256
      learning_rate: 1e-5
      warmup_epochs: 3
      n_samples: 10000
      mse_weight: 0.01
      val_split: 0.1
      patience: 5
      seed: 42
      eta_min_factor: 0.1
      max_grad_norm: 1.0
